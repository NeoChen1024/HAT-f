# general settings
name: AnimeHAT_SRx4_finetune
model_type: HATModel
scale: 4
num_gpu: auto
manual_seed: 0
tf32: true

# torch.compile (uncomment to enable, ~1.8x speedup)
compile:
  mode: default
  backend: inductor
  dynamic: false

# tiled inference for validation (saves VRAM on non-256x256 images)
tile:
  tile_size: 256
  tile_pad: 32

# dataset and data loader settings
datasets:
  train:
    name: wp8k
    type: ImageNetPairedDataset
    dataroot_gt: /home/neo_chen/net/pmem/datasets/WP8K.lmdb
    meta_info_file: /home/neo_chen/net/pmem/datasets/WP8K.lmdb/meta_info.txt
    io_backend:
      type: lmdb

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 6
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: val_61
    type: PairedImageDataset
    dataroot_gt: /net/pmem/neo_chen/datasets/val-62-pairs/GTmod4
    dataroot_lq: /net/pmem/neo_chen/datasets/val-62-pairs/LRbicx4
    io_backend:
      type: disk


# network structures
network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  use_checkpoint: true

# path
path:
  pretrain_network_g: experiments/pretrained_models/HAT_SRx4.pth
  param_key_g: 'params_ema'
  strict_load_g: true
  resume_state: /home/neo_chen/scratchpad/AnimeHAT_SRx4_finetune_resume

# training settings
train:
  ema_decay: 0.999
  accum_steps: 8
  optim_g:
    type: Prodigy
    lr: 1.0
    weight_decay: 0
    betas: [0.95, 0.99]
    use_bias_correction: true
    safeguard_warmup: True
    slice_p: 1

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [50000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 50000
  warmup_iter: 500

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
